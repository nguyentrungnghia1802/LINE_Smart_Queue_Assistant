version: '3.9'

# ── Production compose ─────────────────────────────────────────────────────────
# Usage: docker compose up --build

services:

  postgres:
    image: postgres:16-alpine
    container_name: line-queue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-line_queue}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-line_queue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: line-queue-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      API_PORT:     4000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-line_queue}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: line-queue-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
