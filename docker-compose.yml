# ── Local production-like stack ────────────────────────────────────────────────
# Usage:
#   docker compose up --build
#   docker compose up --build -d   (detached)
#
# Reads: .env  (copy from .env.example, NEVER commit real secrets)
# Images: api → docker/api/Dockerfile#runner
#         web → docker/web/Dockerfile#runner (nginx:alpine)

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-line_queue}
      POSTGRES_USER: ${DB_USER:-postgres}
      # :? syntax — fail fast if DB_PASSWORD is not set
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-line_queue}']
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── API (Express) ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: runner # production stage only
    container_name: lq-api
    restart: unless-stopped
    env_file: .env # loads all vars; overrides below win
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      # Override host to use internal Docker service name "postgres"
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-line_queue}
      CORS_ORIGIN: ${WEB_ORIGIN:-http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Web (nginx + Vite SPA) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: runner
      args:
        # VITE_* are inlined at build time by Vite — provide here or in .env
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-LINE Smart Queue Assistant}
        VITE_LIFF_ID: ${VITE_LIFF_ID:-}
        VITE_LIFF_DEFAULT_BOOKING_PATH: ${VITE_LIFF_DEFAULT_BOOKING_PATH:-/liff/qr/demo-queue-lab-2026}
        VITE_ENABLE_LEGACY_CUSTOMER_AUTH: ${VITE_ENABLE_LEGACY_CUSTOMER_AUTH:-false}
        VITE_LIFF_MOCK: ${VITE_LIFF_MOCK:-false}
        VITE_PAYMENT_MODE: ${VITE_PAYMENT_MODE:-demo}
        VITE_PAYMENT_REDIRECT_BASE_URL: ${VITE_PAYMENT_REDIRECT_BASE_URL:-}
    container_name: lq-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
