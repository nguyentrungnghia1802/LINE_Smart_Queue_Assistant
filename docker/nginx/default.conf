server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"    always;
    add_header X-XSS-Protection          "1; mode=block"                 always;

    # ── API reverse proxy — keep /api prefix for backend /api/v1 routes ───────
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback — all routes served by index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — Vite output is content-hashed → safe long-term cache ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health probe (used by Docker HEALTHCHECK and load-balancers) ───────────
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── Block hidden files (.env, .git, .htaccess …) ──────────────────────────
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }
}
